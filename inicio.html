<!DOCTYPE html>
<html lang="es">
<head>

    <!-- Enlace CDN para diseño responsivo -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<!-- (La clase "d-flex flex-column min-vh-100" hace que el body ocupe toda la pantalla y empuje el footer hacia abajo automáticamente) -->
<body class="d-flex flex-column min-vh-100">

    <!-- Menú de navegación -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="inicio.html">Tienda Argenta</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarSupportedContent">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                <li class="nav-item">
                <a class="nav-link active" aria-current="page" href="inicio.html">Inicio</a>
                </li>
                <li class="nav-item dropdown">
                    <a class="nav-link dropdown-toggle" data-bs-toggle="dropdown" href="productos1.html" role="button" aria-expanded="false">Productos</a>

            </ul>

    <!-- (La clase "flex-grow-1" empuja al footer hacia abajo) -->

        <div id="carouselExampleCaptions" class="carousel slide">
  <div class="carousel-indicators">
    <button type="button" data-bs-target="#carouselExampleCaptions" data-bs-slide-to="0" class="active" aria-current="true" aria-label="Slide 1"></button>
    <button type="button" data-bs-target="#carouselExampleCaptions" data-bs-slide-to="1" aria-label="Slide 2"></button>
    <button type="button" data-bs-target="#carouselExampleCaptions" data-bs-slide-to="2" aria-label="Slide 3"></button>
  </div>
  <div class="carousel-inner">
    <div class="carousel-item active">
      <img src="imagenes/Tienda(Carrusel).png" class="d-block w-100" alt="imagenes/Tienda(Carrusel).png">
      <div class="carousel-caption d-none d-md-block">
        <h5></h5>
      </div>
    </div>
    <div class="carousel-item">
      <img src="imagenes/Parrilla(Carrusel).png" class="d-block w-100" alt="imagenes/Parrilla(Carrusel).png">

        <h4 class="bg-dark bg-opacity-50 text-white p-2 rounded">30% Off durante el mes de mayo 2026</h4>
      </div>
    </div>
    <div class="carousel-item">
      <img src="imagenes/Vino(Carrusel).png" class="d-block w-100" alt="imagenes/Vino(Carrusel).png">
      <div class="carousel-caption d-none d-md-block">
        <h1 class="bg-dark bg-opacity-50 text-white p-2 rounded">Vino Gran Siesta</h1>
        <h4 class="bg-dark bg-opacity-50 text-white p-2 rounded">3x2 en vinos durante el mes de mayo 2026 abonando con MercadoPago</h4>
      </div>
    </div>
  </div>
  <button class="carousel-control-prev" type="button" data-bs-target="#carouselExampleCaptions" data-bs-slide="prev">
    <span class="carousel-control-prev-icon" aria-hidden="true"></span>
    <span class="visually-hidden">Previous</span>
  </button>
  <button class="carousel-control-next" type="button" data-bs-target="#carouselExampleCaptions" data-bs-slide="next">
    <span class="carousel-control-next-icon" aria-hidden="true"></span>
    <span class="visually-hidden">Next</span>
  </button>
</div>

    <footer class="bg-dark text-white py-2 mt-auto">
        <div class="navbar-expand-lg text-center">
            <p>© 2026 Fullstack. Todos los derechos reservados.</p>
